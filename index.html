<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Bible Quiz Game</title>
    <style>
        :root {
            --sda-blue: #003366;
            --sda-gold: #F2A900;
            --bg-color: #f4f6f8;
            --text-color: #333;
            --correct-green: #2ecc71;
            --wrong-red: #e74c3c;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: var(--sda-blue);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header-title {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title span {
            color: var(--sda-gold);
        }
        .reset-btn {
            background: none;
            border: 2px solid var(--sda-gold);
            color: var(--sda-gold);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .reset-btn:hover {
            background: var(--sda-gold);
            color: var(--sda-blue);
        }
        .container {
            flex: 1;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Screens */
        .screen {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }
        .screen.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home Screen */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        .cat-box {
            background: white;
            border-radius: 15px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 4px solid var(--sda-blue);
            position: relative;
        }
        .cat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .cat-box .box-number {
            font-size: 5rem;
            font-weight: bold;
            color: var(--sda-blue);
            transition: opacity 0.3s;
        }
        .cat-box .box-title {
            display: none;
            font-size: 1.8rem;
            text-align: center;
            color: var(--sda-blue);
            padding: 1rem;
            font-weight: bold;
        }
        .cat-box.revealed .box-number {
            display: none;
        }
        .cat-box.revealed .box-title {
            display: block;
            color: var(--sda-gold);
        }
        .cat-box.revealed {
            background: var(--sda-blue);
            border-color: var(--sda-gold);
        }
        
        /* Completed Category Styling */
        .cat-complete-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 3rem;
            color: var(--correct-green);
            display: none;
        }
        .cat-box.cat-completed {
            border-color: var(--correct-green);
        }
        .cat-box.cat-completed .cat-complete-badge {
            display: block;
        }

        .instructions {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            color: #666;
        }

        /* Category Details Screen */
        .back-btn {
            background: var(--sda-blue);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        .category-header {
            color: var(--sda-blue);
            border-bottom: 3px solid var(--sda-gold);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .question-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 3px solid var(--sda-blue);
            transition: all 0.2s;
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 150px;
        }
        .question-card:hover {
            background: #f8f9fa;
            transform: scale(1.05);
        }
        .question-card.answered {
            border-color: var(--correct-green);
            background: #f0fdf4;
            cursor: default;
        }
        .question-card.answered:hover {
            transform: scale(1);
        }
        .q-number-large {
            font-size: 3rem;
            font-weight: bold;
            color: var(--sda-blue);
        }
        .question-card.answered .q-number-large {
            display: none;
        }
        .q-status {
            font-size: 3rem;
            color: var(--correct-green);
            display: none;
        }
        .question-card.answered .q-status {
            display: block;
        }
        .q-answer-reveal {
            display: none;
            margin-top: 1rem;
            color: #27ae60;
            font-weight: bold;
            font-size: 1rem;
        }
        .q-reference-reveal {
            font-size: 0.85rem;
            color: var(--sda-blue);
            font-style: italic;
            margin-top: 0.5rem;
        }
        .question-card.answered .q-answer-reveal {
            display: block;
        }

        /* Play Screen */
        .play-container {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        .timer {
            font-size: 3rem;
            font-weight: bold;
            color: var(--sda-gold);
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            min-height: 4rem;
        }
        .timer.danger {
            color: var(--wrong-red);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .play-question {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--sda-blue);
            min-height: 4rem;
        }
        
        /* Multiple Choice Styles */
        .mcq-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            display: none; /* Hidden during reading phase */
        }
        @media (max-width: 600px) {
            .mcq-grid {
                grid-template-columns: 1fr;
            }
        }
        .mcq-btn {
            padding: 1.2rem;
            font-size: 1.2rem;
            border: 2px solid var(--sda-blue);
            background: white;
            color: var(--sda-blue);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        .mcq-btn:hover:not(:disabled) {
            background: var(--sda-blue);
            color: white;
        }
        .mcq-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .mcq-btn.btn-correct {
            background: var(--correct-green);
            border-color: var(--correct-green);
            color: white;
            opacity: 1 !important;
        }
        .mcq-btn.btn-wrong {
            background: var(--wrong-red);
            border-color: var(--wrong-red);
            color: white;
            opacity: 0.5 !important;
        }

        .feedback {
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 1.5em;
        }
        .feedback.wrong { color: var(--wrong-red); }
        .feedback.correct { color: var(--correct-green); }
        .feedback.timeup { color: var(--wrong-red); }
        .feedback.reading { color: var(--sda-blue); }
        
        .play-reference {
            display: none;
            margin-top: 1rem;
            font-size: 1.2rem;
            color: var(--sda-blue);
            font-style: italic;
            font-weight: bold;
            background: #e1eaf5;
            padding: 0.8rem;
            border-radius: 5px;
        }
        .play-reference.show {
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">📖 <span>SDA</span> Bible Quiz Game</div>
        <button class="reset-btn" onclick="resetGame()">🔄 Reset Progress</button>
    </header>

    <div class="container">
        <!-- Main Screen -->
        <div id="screen-home" class="screen active">
            <p class="instructions">Click a box to reveal its category. Click it again to open the questions!</p>
            <div class="categories-grid" id="categories-container"></div>
        </div>

        <!-- Category Questions Screen -->
        <div id="screen-category" class="screen">
            <button class="back-btn" onclick="goHome()">⬅ Back to Categories</button>
            <h2 class="category-header" id="cat-title">Category Title</h2>
            <div class="questions-grid" id="questions-container"></div>
        </div>

        <!-- Play Screen -->
        <div id="screen-play" class="screen">
            <button class="back-btn" onclick="cancelPlay()">⬅ Back to Categories</button>
            <div class="play-container">
                <div class="timer" id="timer-display">Get Ready...</div>
                <div class="play-question" id="play-question-text">Question text goes here?</div>
                
                <!-- MCQ Grid -->
                <div class="mcq-grid" id="mcq-container"></div>

                <div class="feedback" id="play-feedback"></div>
                <div class="play-reference" id="play-reference"></div>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            {
                id: 'cat1',
                name: 'People in the Bible',
                questions: [
                    { id: 'q1', text: "Who were the first apostles called to follow Jesus?", options: ['Peter and Andrew', 'James and John', 'Philip and Bartholomew', 'Paul and Silas'], correctOption: 'Peter and Andrew', reference: 'Matthew 4:18', diff: 'easy', time: 15 },
                    { id: 'q2', text: "Who murders John the Baptist?", options: ['King Herod Antipas', 'Pontius Pilate', 'Herod the Great', 'Caesar Augustus'], correctOption: 'King Herod Antipas', reference: 'Matthew 14:1-12', diff: 'med', time: 25 },
                    { id: 'q3', text: "Who betrayed Jesus?", options: ['Judas Iscariot', 'Peter', 'Thomas', 'John'], correctOption: 'Judas Iscariot', reference: 'Matthew 26:14-16', diff: 'easy', time: 15 },
                    { id: 'q4', text: "Who is the only daughter of Jacob?", options: ['Dinah', 'Rachel', 'Leah', 'Tamar'], correctOption: 'Dinah', reference: 'Genesis 30:21', diff: 'med', time: 25 },
                    { id: 'q5', text: "This man was sick for quite some time and died before Jesus arrived. When Jesus arrived however, he immediately raised him from the dead.", options: ['Lazarus', "Jairus' daughter", "The widow's son at Nain", 'Nicodemus'], correctOption: 'Lazarus', reference: 'John 11:43-44', diff: 'easy', time: 15 },
                    { id: 'q6', text: "According to the Bible, who was the oldest man who ever lived?", options: ['Methuselah', 'Noah', 'Adam', 'Enoch'], correctOption: 'Methuselah', reference: 'Genesis 5:27', diff: 'easy', time: 15 },
                    { id: 'q7', text: "Who is the woman that is Jewish and queen of Persia?", options: ['Esther', 'Vashti', 'Ruth', 'Jezebel'], correctOption: 'Esther', reference: 'Esther 2:17', diff: 'easy', time: 15 },
                    { id: 'q8', text: "Who is the woman was a prostitute who married Hosea?", options: ['Gomer', 'Rahab', 'Mary Magdalene', 'Delilah'], correctOption: 'Gomer', reference: 'Hosea 1:3', diff: 'med', time: 25 },
                    { id: 'q9', text: "Who is the woman that was a Gentile and the great-grandmother of King David, placing her in the genealogy of Jesus Christ?", options: ['Ruth', 'Rahab', 'Tamar', 'Bathsheba'], correctOption: 'Ruth', reference: 'Ruth 4:13-22 & Matthew 1:5', diff: 'med', time: 25 },
                    { id: 'q10', text: "Who is the baby that was put in a reed basket and placed in the Nile River?", options: ['Moses', 'Aaron', 'Samuel', 'Isaac'], correctOption: 'Moses', reference: 'Exodus 2:3', diff: 'easy', time: 15 },
                    { id: 'q11', text: "Who is the youngster cared for his father's sheep and eventually saved his people from the Philistines by killing the champion Goliath?", options: ['David', 'Saul', 'Samson', 'Jonathan'], correctOption: 'David', reference: '1 Samuel 17', diff: 'easy', time: 15 },
                    { id: 'q12', text: "Who are the parents of John the Baptist?", options: ['Elizabeth and Zacharias', 'Mary and Joseph', 'Hannah and Elkanah', 'Sarah and Abraham'], correctOption: 'Elizabeth and Zacharias', reference: 'Luke 1:13', diff: 'hard', time: 35 },
                    { id: 'q25', text: "Who is the eldest son of Jacob?", options: ['Reuben', 'Joseph', 'Judah', 'Simeon'], correctOption: 'Reuben', reference: 'Genesis 29:32', diff: 'med', time: 25 },
                    { id: 'q26', text: "Who is the disciple of Jesus that He found under the fig tree?", options: ['Nathanael', 'Philip', 'Matthew', 'Zacchaeus'], correctOption: 'Nathanael', reference: 'John 1:48', diff: 'hard', time: 35 }
                ]
            },
            {
                id: 'cat2',
                name: 'Places & Mountains',
                questions: [
                    { id: 'q13', text: "Where was Jesus born?", options: ['Bethlehem', 'Nazareth', 'Jerusalem', 'Capernaum'], correctOption: 'Bethlehem', reference: 'Matthew 2:1', diff: 'easy', time: 15 },
                    { id: 'q14', text: "What place does Jesus performed His first miracle?", options: ['Cana', 'Galilee', 'Bethany', 'Jericho'], correctOption: 'Cana', reference: 'John 2:1-11', diff: 'easy', time: 15 },
                    { id: 'q15', text: "Where was the land that God sent Abraham to sacrifice his son Isaac?", options: ['Mount Moriah', 'Mount Sinai', 'Mount Carmel', 'Mount Ararat'], correctOption: 'Mount Moriah', reference: 'Genesis 22:2', diff: 'med', time: 25 },
                    { id: 'q16', text: "According to Deuteronomy 34:1-4, what mountain was Moses on when he saw Canaan, or the Promised Land, for his first and only time?", options: ['Mount Nebo', 'Mount Sinai', 'Mount Hor', 'Mount Horeb'], correctOption: 'Mount Nebo', reference: 'Deuteronomy 34:1', diff: 'hard', time: 35 },
                    { id: 'q17', text: "According to Genesis 8:4, where did Noah's ark land?", options: ['Mount Ararat', 'Mount Sinai', 'Mount Zion', 'Mount Hermon'], correctOption: 'Mount Ararat', reference: 'Genesis 8:4', diff: 'med', time: 25 },
                    { id: 'q18', text: "Where were Saul and his three sons killed by the Philistines?", options: ['Mount Gilboa', 'Mount Carmel', 'Mount Tabor', 'Mount Olives'], correctOption: 'Mount Gilboa', reference: '1 Samuel 31:1-6', diff: 'hard', time: 35 },
                    { id: 'q19', text: "What mountain is most mentioned in the Bible?", options: ['Mount Zion', 'Mount Sinai', 'Mount Olives', 'Mount Carmel'], correctOption: 'Mount Zion', reference: 'Multiple verses (over 150 times)', diff: 'hard', time: 35 },
                    { id: 'q20', text: "Where did God reveal or give the ten commandments to Moses?", options: ['Mount Sinai', 'Mount Horeb', 'Mount Zion', 'Mount Nebo'], correctOption: 'Mount Sinai', reference: 'Exodus 24:16', diff: 'easy', time: 15 },
                    { id: 'q21', text: "On which mountain did Jesus deliver His prophetic discourse?", options: ['Mount Olives', 'Mount Zion', 'Mount Sinai', 'Mount of Transfiguration'], correctOption: 'Mount Olives', reference: 'Matthew 24:3', diff: 'hard', time: 35 },
                    { id: 'q22', text: "In which city did Abraham originally live before moving to Canaan?", options: ['Ur', 'Haran', 'Babylon', 'Nineveh'], correctOption: 'Ur', reference: 'Genesis 11:31', diff: 'med', time: 25 },
                    { id: 'q23', text: "In which city was Samson imprisoned before his death?", options: ['Gaza', 'Ashkelon', 'Gath', 'Ekron'], correctOption: 'Gaza', reference: 'Judges 16:21', diff: 'med', time: 25 },
                    { id: 'q24', text: "Where did the prophet Jonah go to find a ship to Tarshish?", options: ['Joppa', 'Nineveh', 'Tarshish', 'Tyre'], correctOption: 'Joppa', reference: 'Jonah 1:3', diff: 'med', time: 25 }
                ]
            },
            {
                id: 'cat3',
                name: 'Numbers & Ages',
                questions: [
                    { id: 'q27', text: "How old was David when he was anointed King of Israel?", options: ['30 years old', '20 years old', '33 years old', '40 years old'], correctOption: '30 years old', reference: '2 Samuel 5:4', diff: 'med', time: 25 },
                    { id: 'q28', text: "How many rivers were formed from the river that went out of Eden?", options: ['Four', 'Two', 'Three', 'Seven'], correctOption: 'Four', reference: 'Genesis 2:10', diff: 'med', time: 25 },
                    { id: 'q29', text: "How many years were the Israelites in bondage in Egypt?", options: ['430 years', '400 years', '350 years', '40 years'], correctOption: '430 years', reference: 'Exodus 12:40-41', diff: 'hard', time: 35 },
                    { id: 'q30', text: "How old was Moses when he died?", options: ['120 years', '100 years', '110 years', '150 years'], correctOption: '120 years', reference: 'Deuteronomy 34:7', diff: 'med', time: 25 }
                ]
            }
        ];

        let gameState = {
            revealedCats: [],
            answeredQuestions: []
        };

        let currentActiveQuestion = null;
        let timerInterval = null;
        let readingInterval = null;
        let successTimeout = null;
        let timeLeft = 0;

        function init() {
            loadState();
            renderCategories();
        }

        function loadState() {
            const saved = localStorage.getItem('sdaQuizState');
            if (saved) {
                gameState = JSON.parse(saved);
            }
        }

        function saveState() {
            localStorage.setItem('sdaQuizState', JSON.stringify(gameState));
        }

        function resetGame() {
            if (confirm("Are you sure you want to reset all your progress? This cannot be undone.")) {
                localStorage.removeItem('sdaQuizState');
                gameState = { revealedCats: [], answeredQuestions: [] };
                renderCategories();
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function goHome() {
            renderCategories();
        }

        // Helper to shuffle an array (Fisher-Yates)
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function renderCategories() {
            for (let i = quizData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }

            gameState.revealedCats = [];
            saveState();

            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            quizData.forEach((cat, index) => {
                const box = document.createElement('div');
                box.className = 'cat-box';
                
                const isCategoryComplete = cat.questions.every(q => gameState.answeredQuestions.includes(q.id));
                
                if (isCategoryComplete) {
                    box.classList.add('cat-completed');
                }

                box.innerHTML = `
                    <div class="cat-complete-badge">✔</div>
                    <div class="box-number">${index + 1}</div>
                    <div class="box-title">${cat.name}</div>
                `;

                box.onclick = () => {
                    if (!gameState.revealedCats.includes(cat.id)) {
                        gameState.revealedCats.push(cat.id);
                        saveState();
                        box.classList.add('revealed');
                    } else {
                        openCategory(cat);
                    }
                };

                container.appendChild(box);
            });

            showScreen('screen-home');
        }

        function openCategory(cat) {
            document.getElementById('cat-title').textContent = cat.name;
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            cat.questions.forEach((q, index) => {
                const isAnswered = gameState.answeredQuestions.includes(q.id);
                const card = document.createElement('div');
                card.className = `question-card ${isAnswered ? 'answered' : ''}`;
                
                card.innerHTML = `
                    <div class="q-number-large">${index + 1}</div>
                    <div class="q-status">✔</div>
                    <div class="q-answer-reveal">${q.correctOption}</div>
                    <div class="q-answer-reveal q-reference-reveal">${q.reference}</div>
                `;

                card.onclick = () => {
                    if (!isAnswered) {
                        startPlay(q, cat);
                    }
                };

                container.appendChild(card);
            });

            showScreen('screen-category');
        }

        function startPlay(q, cat) {
            currentActiveQuestion = { ...q, categoryId: cat.id };
            
            document.getElementById('play-question-text').textContent = q.text;
            document.getElementById('mcq-container').style.display = 'none';
            document.getElementById('mcq-container').innerHTML = '';
            document.getElementById('play-reference').classList.remove('show');
            
            const timerDisplay = document.getElementById('timer-display');
            timerDisplay.classList.remove('danger');
            
            const feedback = document.getElementById('play-feedback');
            feedback.className = 'feedback reading';
            feedback.textContent = 'Read carefully... Timer starts soon!';

            showScreen('screen-play');
            
            clearInterval(timerInterval);
            clearInterval(readingInterval);
            clearTimeout(successTimeout);

            let readTimeLeft = 5;
            timerDisplay.textContent = `Starts in ${readTimeLeft}...`;

            readingInterval = setInterval(() => {
                readTimeLeft--;
                if (readTimeLeft > 0) {
                    timerDisplay.textContent = `Starts in ${readTimeLeft}...`;
                } else {
                    clearInterval(readingInterval);
                    startMainTimer(q);
                }
            }, 1000);
        }

        function startMainTimer(q) {
            timeLeft = q.time;
            document.getElementById('play-feedback').textContent = '';
            
            // Build and shuffle MCQ buttons
            const mcqContainer = document.getElementById('mcq-container');
            mcqContainer.style.display = 'grid';
            
            const shuffledOptions = shuffleArray(q.options);
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'mcq-btn';
                btn.textContent = opt;
                btn.onclick = () => checkMcqAnswer(opt, btn);
                mcqContainer.appendChild(btn);
            });
            
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timeUp();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer-display');
            timerEl.textContent = timeLeft;
            if (timeLeft <= 10) {
                timerEl.classList.add('danger');
            } else {
                timerEl.classList.remove('danger');
            }
        }

        function cancelPlay() {
            clearInterval(timerInterval);
            clearInterval(readingInterval);
            clearTimeout(successTimeout);
            goHome();
        }

        function timeUp() {
            // Disable all buttons
            document.querySelectorAll('.mcq-btn').forEach(b => b.disabled = true);
            const fb = document.getElementById('play-feedback');
            fb.className = 'feedback timeup';
            fb.textContent = "Time's up! Click Back to Categories to try again later.";
        }

        function checkMcqAnswer(selectedOption, btnElement) {
            if (timeLeft <= 0) return;
            
            const isCorrect = (selectedOption === currentActiveQuestion.correctOption);
            const fb = document.getElementById('play-feedback');
            const refEl = document.getElementById('play-reference');

            if (isCorrect) {
                clearInterval(timerInterval);
                document.getElementById('timer-display').classList.remove('danger');
                document.getElementById('timer-display').textContent = '✔';
                
                // Disable all buttons and highlight the correct one
                document.querySelectorAll('.mcq-btn').forEach(b => b.disabled = true);
                btnElement.classList.add('btn-correct');
                
                fb.className = 'feedback correct';
                fb.textContent = "Correct! Going back to the Main Screen in 5 seconds...";
                
                // Show Reference
                refEl.textContent = `Reference: ${currentActiveQuestion.reference}`;
                refEl.classList.add('show');
                
                gameState.answeredQuestions.push(currentActiveQuestion.id);
                saveState();

                // Wait 5 seconds before returning to the home screen
                successTimeout = setTimeout(() => {
                    goHome();
                }, 5000);
            } else {
                btnElement.classList.add('btn-wrong');
                btnElement.disabled = true; // Disable just this wrong choice so they can guess again
                
                fb.className = 'feedback wrong';
                fb.textContent = "Incorrect, try another option!";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
