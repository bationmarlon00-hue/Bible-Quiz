<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Bible Quiz Game</title>
    <style>
        :root {
            --sda-blue: #003366;
            --sda-gold: #F2A900;
            --bg-color: #f4f6f8;
            --text-color: #333;
            --correct-green: #2ecc71;
            --wrong-red: #e74c3c;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background-color: var(--sda-blue);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header-title {
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-title span {
            color: var(--sda-gold);
        }
        .reset-btn {
            background: none;
            border: 2px solid var(--sda-gold);
            color: var(--sda-gold);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .reset-btn:hover {
            background: var(--sda-gold);
            color: var(--sda-blue);
        }
        .container {
            flex: 1;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Screens */
        .screen {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }
        .screen.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home Screen */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        .cat-box {
            background: white;
            border-radius: 15px;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 4px solid var(--sda-blue);
            position: relative;
        }
        .cat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .cat-box .box-number {
            font-size: 5rem;
            font-weight: bold;
            color: var(--sda-blue);
            transition: opacity 0.3s;
        }
        .cat-box .box-title {
            display: none;
            font-size: 1.8rem;
            text-align: center;
            color: var(--sda-blue);
            padding: 1rem;
            font-weight: bold;
        }
        .cat-box.revealed .box-number {
            display: none;
        }
        .cat-box.revealed .box-title {
            display: block;
            color: var(--sda-gold);
        }
        .cat-box.revealed {
            background: var(--sda-blue);
            border-color: var(--sda-gold);
        }
        
        /* Completed Category Styling */
        .cat-complete-badge {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 3rem;
            color: var(--correct-green);
            display: none;
        }
        .cat-box.cat-completed {
            border-color: var(--correct-green);
        }
        .cat-box.cat-completed .cat-complete-badge {
            display: block;
        }

        .instructions {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.2rem;
            color: #666;
        }

        /* Category Details Screen */
        .back-btn {
            background: var(--sda-blue);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        .category-header {
            color: var(--sda-blue);
            border-bottom: 3px solid var(--sda-gold);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }
        .question-card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            cursor: pointer;
            border: 3px solid var(--sda-blue);
            transition: all 0.2s;
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 150px;
        }
        .question-card:hover {
            background: #f8f9fa;
            transform: scale(1.05);
        }
        .question-card.answered {
            border-color: var(--correct-green);
            background: #f0fdf4;
            cursor: default;
        }
        .question-card.answered:hover {
            transform: scale(1);
        }
        .q-number-large {
            font-size: 3rem;
            font-weight: bold;
            color: var(--sda-blue);
        }
        .question-card.answered .q-number-large {
            display: none;
        }
        .q-status {
            font-size: 3rem;
            color: var(--correct-green);
            display: none;
        }
        .question-card.answered .q-status {
            display: block;
        }
        .q-answer-reveal {
            display: none;
            margin-top: 1rem;
            color: #27ae60;
            font-weight: bold;
            font-size: 1rem;
        }
        .q-reference-reveal {
            font-size: 0.85rem;
            color: var(--sda-blue);
            font-style: italic;
            margin-top: 0.5rem;
        }
        .question-card.answered .q-answer-reveal {
            display: block;
        }

        /* Play Screen */
        .play-container {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }
        .timer {
            font-size: 3rem;
            font-weight: bold;
            color: var(--sda-gold);
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            min-height: 4rem;
        }
        .timer.danger {
            color: var(--wrong-red);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .play-question {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: var(--sda-blue);
            min-height: 4rem;
        }
        
        /* Multiple Choice Styles */
        .mcq-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
            display: none; /* Hidden during reading phase */
        }
        @media (max-width: 600px) {
            .mcq-grid {
                grid-template-columns: 1fr;
            }
        }
        .mcq-btn {
            padding: 1.2rem;
            font-size: 1.2rem;
            border: 2px solid var(--sda-blue);
            background: white;
            color: var(--sda-blue);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
        }
        .mcq-btn:hover:not(:disabled) {
            background: var(--sda-blue);
            color: white;
        }
        .mcq-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        .mcq-btn.btn-correct {
            background: var(--correct-green);
            border-color: var(--correct-green);
            color: white;
            opacity: 1 !important;
        }
        .mcq-btn.btn-wrong {
            background: var(--wrong-red);
            border-color: var(--wrong-red);
            color: white;
            opacity: 1 !important;
        }

        .feedback {
            margin-top: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 1.5em;
        }
        .feedback.wrong { color: var(--wrong-red); }
        .feedback.correct { color: var(--correct-green); }
        .feedback.timeup { color: var(--wrong-red); }
        .feedback.reading { color: var(--sda-blue); }
        
        .play-reference {
            display: none;
            margin-top: 1rem;
            font-size: 1.2rem;
            color: var(--sda-blue);
            font-style: italic;
            font-weight: bold;
            background: #e1eaf5;
            padding: 0.8rem;
            border-radius: 5px;
        }
        .play-reference.show {
            display: inline-block;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">📖 <span>SDA</span> Bible Quiz Game</div>
        <button class="reset-btn" onclick="resetGame()">🔄 Reset Progress</button>
    </header>

    <div class="container">
        <!-- Main Screen -->
        <div id="screen-home" class="screen active">
            <p class="instructions">Click a box to reveal its category. Click it again to open the questions!</p>
            <div class="categories-grid" id="categories-container"></div>
        </div>

        <!-- Category Questions Screen -->
        <div id="screen-category" class="screen">
            <button class="back-btn" onclick="goHome()">⬅ Back to Categories</button>
            <h2 class="category-header" id="cat-title">Category Title</h2>
            <div class="questions-grid" id="questions-container"></div>
        </div>

        <!-- Play Screen -->
        <div id="screen-play" class="screen">
            <button class="back-btn" onclick="cancelPlay()">⬅ Back to Categories</button>
            <div class="play-container">
                <div class="timer" id="timer-display">Get Ready...</div>
                <div class="play-question" id="play-question-text">Question text goes here?</div>
                
                <!-- MCQ Grid -->
                <div class="mcq-grid" id="mcq-container"></div>

                <div class="feedback" id="play-feedback"></div>
                <div class="play-reference" id="play-reference"></div>
            </div>
        </div>
    </div>

    <script>

            {

                    { id: 'c1q8', text: "How long did Moses’s mother hide him to escape the death edict of Pharaoh?", options: ["13 months", "10 months", "3 months", "7 months"], correctOption: "3 months", reference: "Exod 2:2", time: 15 },
                    { id: 'c1q9', text: "Who was Moses’s father-in-law?", options: ["Laban", "Mordechai", "Jethro", "Cyrus"], correctOption: "Jethro", reference: "Exod 3:1", time: 25 },
                    { id: 'c1q10', text: "What was the name of Aaron’s (Moses’s brother) wife?", options: ["Elisheba", "Miriam", "Zipporah", "Deborah"], correctOption: "Elisheba", reference: "Exod 6:23", time: 35 },

                    { id: 'c1q14', text: "What was the height of Goliath?", options: ["Six cubits and a span", "Seven cubits and two spans", "Nine cubits and a span", "Five cubits and three spans"], correctOption: "Six cubits and a span", reference: "1 Sam 17:4", time: 15 },

                    { id: 'c1q18', text: "How did Paul escape Damascus when the Jews were trying to kill him?", options: ["He was let down from the city walls in a basket", "An angel lifted him out", "An earthquake created the means of escape", "Silas came to his rescue"], correctOption: "He was let down from the city walls in a basket", reference: "Acts 9:25", time: 25 },

                    { id: 'c7q13', text: "Where will the great feast of the marriage supper of the Lamb be spread?", options: ["Earth", "Garden of Eden", "Bosom of Abraham", "Heaven"], correctOption: "Heaven", reference: "Rev 12:9", time: 15 }
                ]

        let gameState = {
            revealedCats: [],
            answeredQuestions: []
        };

        let currentActiveQuestion = null;
        let timerInterval = null;
        let readingInterval = null;
        let redirectTimeout = null;
        let timeLeft = 0;

        function init() {
            loadState();
            renderCategories();
        }

        function loadState() {
            const saved = localStorage.getItem('sdaQuizState');
            if (saved) {
                gameState = JSON.parse(saved);
            }
        }

        function saveState() {
            localStorage.setItem('sdaQuizState', JSON.stringify(gameState));
        }

        function resetGame() {
            if (confirm("Are you sure you want to reset all your progress? This cannot be undone.")) {
                localStorage.removeItem('sdaQuizState');
                gameState = { revealedCats: [], answeredQuestions: [] };
                renderCategories();
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function goHome() {
            renderCategories();
        }

        // Helper to shuffle an array (Fisher-Yates)
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function renderCategories() {
            for (let i = quizData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [quizData[i], quizData[j]] = [quizData[j], quizData[i]];
            }

            gameState.revealedCats = [];
            saveState();

            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            quizData.forEach((cat, index) => {
                const box = document.createElement('div');
                box.className = 'cat-box';
                
                const isCategoryComplete = cat.questions.every(q => gameState.answeredQuestions.includes(q.id));
                
                if (isCategoryComplete) {
                    box.classList.add('cat-completed');
                }

                box.innerHTML = `
                    <div class="cat-complete-badge">✔</div>
                    <div class="box-number">${index + 1}</div>
                    <div class="box-title">${cat.name}</div>
                `;

                box.onclick = () => {
                    if (!gameState.revealedCats.includes(cat.id)) {
                        gameState.revealedCats.push(cat.id);
                        saveState();
                        box.classList.add('revealed');
                    } else {
                        openCategory(cat);
                    }
                };

                container.appendChild(box);
            });

            showScreen('screen-home');
        }

        function openCategory(cat) {
            document.getElementById('cat-title').textContent = cat.name;
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            cat.questions.forEach((q, index) => {
                const isAnswered = gameState.answeredQuestions.includes(q.id);
                const card = document.createElement('div');
                card.className = `question-card ${isAnswered ? 'answered' : ''}`;
                
                card.innerHTML = `
                    <div class="q-number-large">${index + 1}</div>
                    <div class="q-status">✔</div>
                    <div class="q-answer-reveal">${q.correctOption}</div>
                    <div class="q-answer-reveal q-reference-reveal">${q.reference}</div>
                `;

                card.onclick = () => {
                    if (!isAnswered) {
                        startPlay(q, cat);
                    }
                };

                container.appendChild(card);
            });

            showScreen('screen-category');
        }

        function startPlay(q, cat) {
            currentActiveQuestion = { ...q, categoryId: cat.id };
            
            document.getElementById('play-question-text').textContent = q.text;
            document.getElementById('mcq-container').style.display = 'none';
            document.getElementById('mcq-container').innerHTML = '';
            document.getElementById('play-reference').classList.remove('show');
            
            const timerDisplay = document.getElementById('timer-display');
            timerDisplay.classList.remove('danger');
            
            const feedback = document.getElementById('play-feedback');
            feedback.className = 'feedback reading';
            feedback.textContent = 'Read carefully... Timer starts soon!';

            showScreen('screen-play');
            
            clearInterval(timerInterval);
            clearInterval(readingInterval);
            clearTimeout(redirectTimeout);

            let readTimeLeft = 5;
            timerDisplay.textContent = `Starts in ${readTimeLeft}...`;

            readingInterval = setInterval(() => {
                readTimeLeft--;
                if (readTimeLeft > 0) {
                    timerDisplay.textContent = `Starts in ${readTimeLeft}...`;
                } else {
                    clearInterval(readingInterval);
                    startMainTimer(q);
                }
            }, 1000);
        }

        function startMainTimer(q) {
            timeLeft = q.time;
            document.getElementById('play-feedback').textContent = '';
            
            // Build and shuffle MCQ buttons
            const mcqContainer = document.getElementById('mcq-container');
            mcqContainer.style.display = 'grid';
            
            const shuffledOptions = shuffleArray(q.options);
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'mcq-btn';
                btn.textContent = opt;
                btn.onclick = () => checkMcqAnswer(opt, btn);
                mcqContainer.appendChild(btn);
            });
            
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timeUp();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const timerEl = document.getElementById('timer-display');
            timerEl.textContent = timeLeft;
            if (timeLeft <= 10) {
                timerEl.classList.add('danger');
            } else {
                timerEl.classList.remove('danger');
            }
        }

        function cancelPlay() {
            clearInterval(timerInterval);
            clearInterval(readingInterval);
            clearTimeout(redirectTimeout);
            goHome();
        }

        function timeUp() {
            // Disable all buttons
            document.querySelectorAll('.mcq-btn').forEach(b => b.disabled = true);
            const fb = document.getElementById('play-feedback');
            fb.className = 'feedback timeup';
            fb.textContent = "Time's up! Going back to the Main Screen in 5 seconds...";
            
            redirectTimeout = setTimeout(() => {
                goHome();
            }, 5000);
        }

        function checkMcqAnswer(selectedOption, btnElement) {
            if (timeLeft <= 0) return;
            
            const isCorrect = (selectedOption === currentActiveQuestion.correctOption);
            const fb = document.getElementById('play-feedback');
            const refEl = document.getElementById('play-reference');

            if (isCorrect) {
                clearInterval(timerInterval);
                document.getElementById('timer-display').classList.remove('danger');
                document.getElementById('timer-display').textContent = '✔';
                
                // Disable all buttons and highlight the correct one
                document.querySelectorAll('.mcq-btn').forEach(b => b.disabled = true);
                btnElement.classList.add('btn-correct');
                
                fb.className = 'feedback correct';
                fb.textContent = "Correct! Going back to the Main Screen in 5 seconds...";
                
                // Show Reference
                refEl.textContent = `Reference: ${currentActiveQuestion.reference}`;
                refEl.classList.add('show');
                
                gameState.answeredQuestions.push(currentActiveQuestion.id);
                saveState();

                // Wait 5 seconds before returning to the home screen
                redirectTimeout = setTimeout(() => {
                    goHome();
                }, 5000);
            } else {
                clearInterval(timerInterval); // Stop the timer immediately
                document.getElementById('timer-display').classList.add('danger');
                document.getElementById('timer-display').textContent = '❌';
                
                // Disable all buttons so they cannot click anything else
                document.querySelectorAll('.mcq-btn').forEach(b => b.disabled = true);
                btnElement.classList.add('btn-wrong');
                
                fb.className = 'feedback wrong';
                fb.textContent = "Incorrect! Going back to the Main Screen in 5 seconds...";
                
                // Wait 5 seconds before returning to the home screen
                redirectTimeout = setTimeout(() => {
                    goHome();
                }, 5000);
            }
        }

        window.onload = init;
    </script>
